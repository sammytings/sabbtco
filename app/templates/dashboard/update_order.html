{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Update Order | SABBTCo Dashboard</title>

    <link rel="stylesheet"
          href="{% static 'css/global.css' %}">

    <link rel="stylesheet"
          href="{% static 'css/dashboard.css' %}">

    <!-- REMIX ICONS -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
          rel="stylesheet">

</head>

<body>

<div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="brand">

                <div class="brand-logo">
                    S
                </div>

                <div>

                    <h2>SABBTCo.</h2>

                    <span>Admin Dashboard</span>

                </div>

            </div>

        </div>

        <nav class="sidebar-menu">

            <a href="{% url 'dashboard' %}">
                <i class="ri-dashboard-line"></i>
                Dashboard
            </a>

            <a href="{% url 'customers' %}">
                <i class="ri-group-line"></i>
                Customers
            </a>

        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">

            <div>

                <h1>Update Order</h1>

                <p>
                    {{ order.order_id }}
                </p>

            </div>

        </header>

        <!-- FORM -->
        <section class="dashboard-section">

            <div class="form-card">

                <form method="POST">

                    {% csrf_token %}

                    <div class="form-grid">

                        <!-- CUSTOMER -->
                        <div class="form-group">

                            <label>
                                Customer
                            </label>

                            <input type="text"
                                   value="{{ order.full_name }}"
                                   disabled>

                        </div>

                        <!-- PRODUCT -->
                        <div class="form-group">

                            <label>
                                Product
                            </label>

                            <input type="text"
                                   value="{{ order.product_name }}"
                                   disabled>

                        </div>

                        <!-- STATUS -->
                        <div class="form-group">

                            <label>
                                Order Status
                            </label>

                            <select name="status">

                                <option value="pending"
                                {% if order.status == 'pending' %}
                                selected
                                {% endif %}>
                                    Pending
                                </option>

                                <option value="processing"
                                {% if order.status == 'processing' %}
                                selected
                                {% endif %}>
                                    Processing
                                </option>

                                <option value="paid"
                                {% if order.status == 'paid' %}
                                selected
                                {% endif %}>
                                    Paid
                                </option>

                                <option value="shipping"
                                {% if order.status == 'shipping' %}
                                selected
                                {% endif %}>
                                    Shipping
                                </option>

                                <option value="arrived"
                                {% if order.status == 'arrived' %}
                                selected
                                {% endif %}>
                                    Arrived
                                </option>

                                <option value="delivered"
                                {% if order.status == 'delivered' %}
                                selected
                                {% endif %}>
                                    Delivered
                                </option>

                                <option value="cancelled"
                                {% if order.status == 'cancelled' %}
                                selected
                                {% endif %}>
                                    Cancelled
                                </option>

                            </select>

                        </div>

                        <!-- TRACKING -->
                        <div class="form-group">

                            <label>
                                Tracking Number
                            </label>

                            <input type="text"
                                   name="tracking_number"
                                   value="{{ order.tracking_number }}">

                        </div>

                        <!-- AMOUNT -->
                        <div class="form-group">

                            <label>
                                Amount (USD)
                            </label>

                            <input type="number"
                                   step="0.01"
                                   name="amount"
                                   value="{{ order.amount }}">

                        </div>

                        <!-- NOTES -->
                        <div class="form-group full">

                            <label>
                                Admin Notes
                            </label>

                            <textarea name="notes"
                                      rows="5">{{ order.notes }}</textarea>

                        </div>

                    </div>

                    <div class="form-actions">

                        <button type="submit"
                                class="btn-primary">

                            <i class="ri-save-line"></i>

                            Save Changes

                        </button>

                        <a href="{% url 'dashboard' %}"
                           class="btn-secondary">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

</body>
</html>
