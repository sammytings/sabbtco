<form method="GET">

    <input type="text"
           name="order_id"
           placeholder="Enter Order ID">

    <button type="submit">

        Track

    </button>

</form>

{% if order %}

<div class="tracking-card">

    <h2>
        {{ order.order_id }}
    </h2>

    <p>
        Status:
        {{ order.status }}
    </p>

    <p>
        Tracking:
        {{ order.tracking_number }}
    </p>

</div>

{% endif %}
